<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Geometry Formulas</title>
  <desc id="desc">A visual reference card with geometry formulas and diagrams for circle, triangle, and prism measurements.</desc>
  <rect width="1200" height="630" fill="#fffdfa"/>
  <rect x="52" y="48" width="1096" height="534" rx="26" fill="#f6ead7" stroke="#ddd7cc" stroke-width="3"/>
  <rect x="84" y="80" width="1032" height="470" rx="18" fill="#fffdfa"/>
  <g transform="translate(116 118)">
    <text x="0" y="0" fill="#17211d" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">Geometry Formulas</text>
    <text x="3" y="58" fill="#506158" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="600">Area, perimeter, volume &amp; surface area calculators</text>
    <line x1="0" y1="91" x2="490" y2="91" stroke="#137c5a" stroke-width="8" stroke-linecap="round"/>
  </g>
